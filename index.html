/* ---------------------------------- utils ---------------------------------- */
const uid = () => Math.random().toString(36).slice(2, 10);
const avg = (arr) => (arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : null);
const fmt1 = (n) => (n == null ? "―" : (Math.round(n * 10) / 10).toString());

const KEYS = {
  students: "sougaku-seiseki:students",
  tests: "sougaku-seiseki:tests",

async function safeGet(key, fallback) {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.indexOf("PASTE_YOUR") === 0) return fallback;
  try {
    const res = await fetch(APPS_SCRIPT_URL + "?key=" + encodeURIComponent(key));
    const data = await res.json();
    if (data.value == null || data.value === "") return fallback;
    return JSON.parse(data.value);
  } catch (e) {
    console.error("get failed", e);
    return fallback;
  }
}
async function safeSet(key, value) {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.indexOf("PASTE_YOUR") === 0) return false;
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ key, value: JSON.stringify(value) }),
    });
    return true;
  } catch (e) {
    console.error("save failed", e);
    return false;
  }
}

function scoreFor(scores, studentId, testId) {
  const r = scores.find((sc) => sc.studentId === studentId && sc.testId === testId);
  return r ? r.score : null;
}

function computeWeakUnits(scores, students, tests, studentId) {
  const activeIds = students.filter((s) => !s.isGraduate).map((s) => s.id);
  const tagStats = {};
  tests.forEach((t) => {
    if (!t.tags || !t.tags.length || !t.maxScore) return;
    const mine = scoreFor(scores, studentId, t.id);
    if (mine == null) return;
    const myPct = (mine / t.maxScore) * 100;
    const classVals = scores
      .filter((sc) => sc.testId === t.id && activeIds.includes(sc.studentId))
      .map((sc) => (sc.score / t.maxScore) * 100);
    const classPct = avg(classVals);
    t.tags.forEach((tag) => {
      if (!tagStats[tag]) tagStats[tag] = { myPcts: [], classPcts: [] };
      tagStats[tag].myPcts.push(myPct);
      if (classPct != null) tagStats[tag].classPcts.push(classPct);
    });
  });
  return Object.entries(tagStats)
    .map(([tag, d]) => {
      const myAvg = avg(d.myPcts);
      const classAvg = avg(d.classPcts);
      return { tag, myAvg, classAvg, gap: classAvg != null ? myAvg - classAvg : null, count: d.myPcts.length };
    })
    .sort((a, b) => (a.gap ?? 999) - (b.gap ?? 999));
}

function computeRanking(scores, students, tests) {
  const activeStudents = students.filter((s) => !s.isGraduate);
  return activeStudents
    .map((s) => {
      const mine = scores.filter((sc) => sc.studentId === s.id);
      const pcts = mine
        .map((sc) => {
          const t = tests.find((tt) => tt.id === sc.testId);
          return t && t.maxScore ? (sc.score / t.maxScore) * 100 : null;
        })
        .filter((v) => v != null);
      return { id: s.id, name: s.name, avgPct: avg(pcts), count: pcts.length };
    })
    .filter((r) => r.avgPct != null)
    .sort((a, b) => b.avgPct - a.avgPct);
}

function graduateComparison(scores, students, tests, testName, studentTargetUniv) {
  const matchingTestIds = tests.filter((t) => t.name === testName).map((t) => t.id);
  if (!matchingTestIds.length) return { avg: null, matched: false, n: 0 };
  const grads = students.filter((s) => s.isGraduate);
  const sameUniv = grads.filter((s) => s.admittedUniv === studentTargetUniv || s.targetUniv === studentTargetUniv);
  const pool = sameUniv.length ? sameUniv : grads;
  const ids = pool.map((s) => s.id);
  const testsById = Object.fromEntries(tests.map((t) => [t.id, t]));
  const pcts = scores
    .filter((sc) => matchingTestIds.includes(sc.testId) && ids.includes(sc.studentId))
    .map((sc) => {
      const t = testsById[sc.testId];
      return t && t.maxScore ? (sc.score / t.maxScore) * 100 : null;
    })
    .filter((v) => v != null);
  return { avg: avg(pcts), matched: sameUniv.length > 0, n: pcts.length };
}

function PasswordSettings({ currentPass, saveTeacherPass, notify }) {
  const [oldPw, setOldPw] = useState("");
  const [newPw, setNewPw] = useState("");
  const [newPw2, setNewPw2] = useState("");
  const [error, setError] = useState("");

  function change() {
    if (oldPw !== currentPass) { setError("現在のパスワードが正しくありません"); return; }
    if (!newPw.trim()) { setError("新しいパスワードを入力してください"); return; }
    if (newPw !== newPw2) { setError("新しいパスワードが一致しません"); return; }
    setError("");
    saveTeacherPass(newPw);
    setOldPw(""); setNewPw(""); setNewPw2("");
    notify("パスワードを変更しました");
  }

  return (
    <div className="card" style={{ maxWidth: 420 }}>
      <h2>管理者パスワードの変更</h2>
      <div className="sub">生徒には共有しないでください</div>
      <div className="field"><label>現在のパスワード</label><input type="password" value={oldPw} onChange={(e) => setOldPw(e.target.value)} /></div>
      <div className="field"><label>新しいパスワード</label><input type="password" value={newPw} onChange={(e) => setNewPw(e.target.value)} /></div>
      <div className="field"><label>新しいパスワード（確認）</label><input type="password" value={newPw2} onChange={(e) => setNewPw2(e.target.value)} /></div>
      <button className="btn" onClick={change}><Icon name="check" size={14} />変更する</button>
      {error && <div className="errmsg">{error}</div>}
    </div>
  );
}

          <div className="field"><label>学年 / 卒業年度（任意）</label><input value={form.gradYear} onChange={(e) => setForm({ ...form, gradYear: e.target.value })} placeholder="例）2027年卒 / 高3" /></div>

function TestManager({ tests, saveTests, saveScores, scores, notify }) {
  const blank = { name: "", date: "", maxScore: 100, tagsInput: "" };
  const [form, setForm] = useState(blank);

  function addTest() {
    if (!form.name.trim()) return;
    const tags = form.tagsInput.split(/[,、]/).map((t) => t.trim()).filter(Boolean);
    const next = [...tests, { id: uid(), name: form.name, date: form.date, maxScore: Number(form.maxScore) || 100, tags }];
    saveTests(next);
    setForm(blank);
    notify("テストを登録しました");
  }
  function removeTest(id) {
    if (!confirm("このテストを削除しますか？（関連する得点データも削除されます）")) return;
    saveTests(tests.filter((t) => t.id !== id));
    saveScores(scores.filter((sc) => sc.testId !== id));
    notify("テストを削除しました");
  }
  const sorted = [...tests].sort((a, b) => (a.date || "").localeCompare(b.date || ""));

  return (
    <div>
      <div className="card">
        <h2>テストを登録</h2>
        <div className="sub">単元タグを付けると、生徒ページで苦手分野を自動集計できます</div>
        <div className="row3">
          <div className="field"><label>テスト名</label><input value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} placeholder="例）第10回 確認テスト" /></div>
          <div className="field"><label>実施日</label><input type="date" value={form.date} onChange={(e) => setForm({ ...form, date: e.target.value })} /></div>
          <div className="field"><label>満点</label><input type="number" value={form.maxScore} onChange={(e) => setForm({ ...form, maxScore: e.target.value })} /></div>
        </div>
        <div className="field"><label>単元タグ（カンマ区切り）</label><input value={form.tagsInput} onChange={(e) => setForm({ ...form, tagsInput: e.target.value })} placeholder="例）二次関数, 図形と計量" /></div>
        <button className="btn" onClick={addTest}><Icon name="plus" size={14} />登録する</button>
      </div>

      <div className="card">
        <h2>テスト一覧（{tests.length}件）</h2>
        {tests.length === 0 ? <div className="empty">まだテストが登録されていません</div> : (
          <table>
            <thead><tr><th>テスト名</th><th>実施日</th><th>満点</th><th>単元タグ</th><th></th></tr></thead>
            <tbody>
              {sorted.map((t) => (
                <tr key={t.id}>
                  <td>{t.name}</td>
                  <td className="ss-mono">{t.date || "―"}</td>
                  <td className="ss-mono">{t.maxScore}</td>
                  <td>{(t.tags || []).map((tag) => <span className="tagchip" key={tag}>{tag}</span>)}{(!t.tags || !t.tags.length) && "―"}</td>
                  <td><button className="btn danger" onClick={() => removeTest(t.id)}><Icon name="trash" size={14} /></button></td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

function ScoreEntry({ students, tests, scores, saveScores, notify }) {
  const activeStudents = students.filter((s) => !s.isGraduate);
  const graduateStudents = students.filter((s) => s.isGraduate);
  const sortedTests = [...tests].sort((a, b) => (b.date || "").localeCompare(a.date || ""));
  const [testId, setTestId] = useState(sortedTests[0]?.id || "");
  const [draft, setDraft] = useState({});

  useEffect(() => { if (!testId && sortedTests.length) setTestId(sortedTests[0].id); }, [sortedTests.length]);

  useEffect(() => {
    if (!testId) return;
    const d = {};
    [...activeStudents, ...graduateStudents].forEach((s) => {
      const v = scoreFor(scores, s.id, testId);
      d[s.id] = v == null ? "" : String(v);
    });
    setDraft(d);
  }, [testId]);

  if (!tests.length) return <div className="card"><div className="empty">先に「テスト管理」からテストを登録してください</div></div>;

  function save() {
    const others = scores.filter((sc) => sc.testId !== testId);
    const mine = Object.entries(draft)
      .filter(([, v]) => v !== "" && v != null && !isNaN(Number(v)))
      .map(([studentId, v]) => ({ studentId, testId, score: Number(v) }));
    saveScores([...others, ...mine]);
    notify("得点を保存しました");
  }

  const currentTest = tests.find((t) => t.id === testId);

  return (
    <div className="card">
      <h2>採点入力</h2>
      <div className="sub">テストを選び、各生徒の得点を入力してください（満点：{currentTest?.maxScore}）</div>
      <div className="field" style={{ maxWidth: 360 }}>
        <label>テストを選択</label>
        <select value={testId} onChange={(e) => setTestId(e.target.value)}>
          {sortedTests.map((t) => <option key={t.id} value={t.id}>{t.name}{t.date ? `（${t.date}）` : ""}</option>)}
        </select>
      </div>
      {activeStudents.length === 0 && graduateStudents.length === 0 ? (
        <div className="empty">先に「生徒管理」から生徒を登録してください</div>
      ) : (
        <table className="scoretable">
          <thead><tr><th>氏名</th><th>区分</th><th>得点</th></tr></thead>
          <tbody>
            {activeStudents.map((s) => (
              <tr key={s.id}>
                <td>{s.name}</td>
                <td><span className="pill" style={{ background: "#EEF0F5", color: "var(--ink-soft)" }}>在籍生</span></td>
                <td><input value={draft[s.id] ?? ""} onChange={(e) => setDraft({ ...draft, [s.id]: e.target.value })} placeholder="―" /></td>
              </tr>
            ))}
            {graduateStudents.map((s) => (
              <tr key={s.id}>
                <td>{s.name}</td>
                <td><span className="pill grad"><Icon name="award" size={11} />卒業生</span></td>
                <td><input value={draft[s.id] ?? ""} onChange={(e) => setDraft({ ...draft, [s.id]: e.target.value })} placeholder="―" /></td>
              </tr>
            ))}
          </tbody>
        </table>
      )}
      <div style={{ marginTop: 16 }}>
        <button className="btn" onClick={save}><Icon name="check" size={14} />この内容を保存</button>
      </div>
    </div>
  );
}

function StudentLogin({ students, onLogin, onBack }) {
  const active = students.filter((s) => !s.isGraduate);
  const [name, setName] = useState(active[0]?.id || "");
  const [pin, setPin] = useState("");
  const [error, setError] = useState("");

  function submit() {
    const s = active.find((s) => s.id === name);
    if (!s) { setError("生徒を選択してください"); return; }
    if (s.pin !== pin) { setError("PINが正しくありません"); return; }
    setError(""); onLogin(s.id);
  }

  return (
    <div className="ss-wrap">
      <TopBar title="生徒用成績ページ" onBack={onBack} />
      <div className="login-box card">
        <div className="lock"><Icon name="lock" size={18} /></div>
        <h2>氏名とPINでログイン</h2>
        <div className="sub">先生から伝えられたPINを入力してください</div>
        {active.length === 0 ? <div className="empty">まだ生徒が登録されていません</div> : (
          <>
            <div className="field">
              <label>氏名</label>
              <select value={name} onChange={(e) => setName(e.target.value)}>
                {active.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}

function StudentDashboard({ studentId, students, tests, scores, onLogout }) {
  const student = students.find((s) => s.id === studentId);
  const activeIds = students.filter((s) => !s.isGraduate).map((s) => s.id);

  const myTests = useMemo(() => [...tests]
    .filter((t) => scoreFor(scores, studentId, t.id) != null)
    .sort((a, b) => (a.date || "").localeCompare(b.date || "")), [tests, scores, studentId]);

  const trendData = myTests.map((t) => {
    const my = scoreFor(scores, studentId, t.id);
    const classVals = scores.filter((sc) => sc.testId === t.id && activeIds.includes(sc.studentId)).map((sc) => sc.score);
    const classAvg = avg(classVals);
    return { name: t.name, date: t.date, 自分: my, 平均: classAvg == null ? null : Math.round(classAvg * 10) / 10, maxScore: t.maxScore };
  });

  const ranking = useMemo(() => computeRanking(scores, students, tests), [scores, students, tests]);
  const myRankIdx = ranking.findIndex((r) => r.id === studentId);
  const myRank = myRankIdx >= 0 ? myRankIdx + 1 : null;
  const totalRanked = ranking.length;

  const weak = useMemo(() => computeWeakUnits(scores, students, tests, studentId), [scores, students, tests, studentId]);
  const weakBottom = weak.filter((w) => w.gap != null).slice(0, 4);
  const maxAbsGap = Math.max(1, ...weak.map((w) => Math.abs(w.gap || 0)));

  const latestTest = myTests[myTests.length - 1];
  const latestDelta = latestTest ? (() => {
    const my = scoreFor(scores, studentId, latestTest.id);
    const classVals = scores.filter((sc) => sc.testId === latestTest.id && activeIds.includes(sc.studentId)).map((sc) => sc.score);
    const cAvg = avg(classVals);
    return cAvg == null ? null : my - cAvg;
  })() : null;

  const overallPct = ranking[myRankIdx]?.avgPct;

  if (!student) return null;

  return (
    <div className="ss-wrap">
      <TopBar title="生徒用成績ページ" onBack={onLogout} />
      <div className="dash-head">
        <div>
          <h1>{student.name} さんの成績</h1>
          <div className="meta">{student.highSchool || "高校未登録"} ／ 志望大学：{student.targetUniv || "未登録"}</div>
        </div>
        <button className="btn ghost" onClick={onLogout}><Icon name="logout" size={14} />ログアウト</button>
      </div>

      {myTests.length === 0 ? (
        <div className="card"><div className="empty">まだ得点が登録されていません。先生に確認してください。</div></div>
      ) : (
        <>
          <div className="stat-grid">
            <div className="stat-card">
              <div className="label">直近テストの平均点との差異</div>
              {latestDelta == null ? <div className="value small">―</div> : (
                <div className={"value " + (latestDelta > 0 ? "delta up" : latestDelta < 0 ? "delta down" : "delta flat")}>
                  {latestDelta > 0 ? "+" : ""}{fmt1(latestDelta)}
                </div>
              )}
              <div className="note">{latestTest?.name}</div>
            </div>
            <div className="stat-card">
              <div className="label">総合得点率（全テスト平均）</div>
              <div className="value">{overallPct == null ? "―" : fmt1(overallPct) + "%"}</div>
              <div className="note">得点/満点の平均</div>
            </div>
            <div className="stat-card" style={{ display: "flex", alignItems: "center", gap: 14 }}>
              <div className="stamp">
                <div className="r-num ss-mono">{myRank ?? "―"}</div>
                <div className="r-den">/ {totalRanked || "―"}位</div>
              </div>
              <div>
                <div className="label" style={{ marginBottom: 2 }}>受講者ランク</div>
                <div className="note">在籍生{totalRanked}名中の総合順位</div>
              </div>
            </div>
          </div>

          <div className="card">
            <div className="section-title"><span className="n">1</span>成績推移（自分 vs クラス平均）</div>
            <ResponsiveContainer width="100%" height={260}>
              <LineChart data={trendData} margin={{ top: 6, right: 16, bottom: 6, left: -14 }}>
                <CartesianGrid stroke="#EFEDE5" vertical={false} />
                <XAxis dataKey="name" tick={{ fontSize: 11, fill: "var(--ink-soft)" }} interval={0} angle={-20} textAnchor="end" height={54} />
                <YAxis tick={{ fontSize: 11, fill: "var(--ink-soft)" }} />
                <Tooltip contentStyle={{ fontSize: 12, fontFamily: "Zen Kaku Gothic New" }} />
                <Legend wrapperStyle={{ fontSize: 12 }} />
                <Line type="monotone" dataKey="自分" stroke="#1C2541" strokeWidth={2.5} dot={{ r: 3 }} />
                <Line type="monotone" dataKey="平均" stroke="#9AA3BC" strokeWidth={2} strokeDasharray="4 3" dot={{ r: 2 }} />
              </LineChart>
            </ResponsiveContainer>
          </div>

          <div className="card">
            <div className="section-title"><span className="n">2</span>平均点との差異（テスト別）</div>
            <table>
              <thead><tr><th>テスト</th><th>実施日</th><th>自分</th><th>平均</th><th>差</th></tr></thead>
              <tbody>
                {myTests.map((t) => {
                  const my = scoreFor(scores, studentId, t.id);
                  const classVals = scores.filter((sc) => sc.testId === t.id && activeIds.includes(sc.studentId)).map((sc) => sc.score);
                  const cAvg = avg(classVals);
                  const d = cAvg == null ? null : my - cAvg;
                  return (
                    <tr key={t.id}>
                      <td>{t.name}</td>
                      <td className="ss-mono">{t.date || "―"}</td>
                      <td className="ss-mono">{my}/{t.maxScore}</td>
                      <td className="ss-mono">{cAvg == null ? "―" : fmt1(cAvg)}</td>
                      <td className={"ss-mono " + (d > 0 ? "delta up" : d < 0 ? "delta down" : "delta flat")}>{d == null ? "―" : (d > 0 ? "+" : "") + fmt1(d)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          <div className="card">
            <div className="section-title"><span className="n">3</span>過去の先輩（合格者）との比較</div>
            <table>
              <thead><tr><th>テスト</th><th>自分の得点率</th><th>先輩平均得点率</th><th>差</th><th>比較対象</th></tr></thead>
              <tbody>
                {myTests.map((t) => {
                  const my = scoreFor(scores, studentId, t.id);
                  const myPct = (my / t.maxScore) * 100;
                  const g = graduateComparison(scores, students, tests, t.name, student.targetUniv);
                  const d = g.avg == null ? null : myPct - g.avg;
                  return (
                    <tr key={t.id}>
                      <td>{t.name}</td>
                      <td className="ss-mono">{fmt1(myPct)}%</td>
                      <td className="ss-mono">{g.avg == null ? "データなし" : fmt1(g.avg) + "%"}</td>
                      <td className={"ss-mono " + (d == null ? "" : d > 0 ? "delta up" : d < 0 ? "delta down" : "delta flat")}>{d == null ? "―" : (d > 0 ? "+" : "") + fmt1(d)}</td>
                      <td style={{ fontSize: 11.5, color: "var(--ink-soft)" }}>{g.n === 0 ? "―" : g.matched ? `志望大学一致（${g.n}件）` : `全合格者（${g.n}件）`}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            <div className="note" style={{ marginTop: 10, fontSize: 11.5, color: "var(--ink-soft)" }}>※同名テストの過去実施分を先輩（卒業生）データと突き合わせて比較しています。志望大学が一致する先輩のデータがあればそちらを優先します。</div>
          </div>

          <div className="card">
            <div className="section-title"><span className="n">4</span>苦手分野ピックアップ</div>
            {weak.length === 0 ? <div className="empty">単元タグ付きのテストがまだありません</div> : (
              <>
                {weakBottom.length > 0 && weakBottom[0].gap < 0 && (
                  <div className="warn-banner" style={{ marginBottom: 16 }}>
                    <Icon name="trendDown" size={16} style={{ flexShrink: 0, marginTop: 1 }} />
                    <span>特に「{weakBottom.filter((w) => w.gap < 0).slice(0, 3).map((w) => w.tag).join("・")}」がクラス平均を下回っています。優先的に復習しましょう。</span>
                  </div>
                )}
                {weak.map((w) => {
                  const pct = Math.min(100, (Math.abs(w.gap || 0) / maxAbsGap) * 50);
                  return (
                    <div className="weak-row" key={w.tag}>
                      <div className="tagname">{w.tag}</div>
                      <div className="weak-bar-track">
                        <div className="weak-bar-fill" style={{
                          width: pct + "%",
                          marginLeft: w.gap < 0 ? (50 - pct) + "%" : "50%",
                          background: w.gap == null ? "var(--ink-soft)" : w.gap < 0 ? "var(--alert)" : "var(--growth)",
                        }} />
                        <div className="weak-mark" style={{ left: "50%" }} />
                      </div>
                      <div className="gapval">{w.gap == null ? "―" : (w.gap > 0 ? "+" : "") + fmt1(w.gap) + "%"}</div>
                    </div>
                  );
                })}
                <div className="note" style={{ marginTop: 12, fontSize: 11.5, color: "var(--ink-soft)" }}>数値はクラス平均得点率との差（マイナスが苦手分野）。中央の線がクラス平均です。</div>
              </>
            )}
          </div>
        </>
      )}
    </div>
  );
}

/* ---------------------------------- App ---------------------------------- */
function App() {
  const [view, setView] = useState("home");
  const [students, setStudents] = useState([]);
  const [tests, setTests] = useState([]);
  const [scores, setScores] = useState([]);
  const [loading, setLoading] = useState(true);
  const [studentId, setStudentId] = useState(null);
  const [toast, setToast] = useState("");
  const [teacherPass, setTeacherPass] = useState("");

  useEffect(() => {
    (async () => {
      const [s, t, sc, tp] = await Promise.all([
        safeGet(KEYS.students, []),
        safeGet(KEYS.tests, []),
        safeGet(KEYS.scores, []),
        safeGet(KEYS.teacherPass, ""),
      ]);
      setStudents(s); setTests(t); setScores(sc); setTeacherPass(tp);
      setLoading(false);
    })();
  }, []);

  function notify(text) {
    setToast(text);
    window.clearTimeout(window.__ssToastTimer);
    window.__ssToastTimer = window.setTimeout(() => setToast(""), 2200);
  }

  async function saveStudents(list) { setStudents(list); await safeSet(KEYS.students, list); }
  async function saveTests(list) { setTests(list); await safeSet(KEYS.tests, list); }
  async function saveScores(list) { setScores(list); await safeSet(KEYS.scores, list); }
  async function saveTeacherPass(pw) { setTeacherPass(pw); await safeSet(KEYS.teacherPass, pw); }

  return (
    <>
      {loading ? (
        <div className="ss-wrap"><div className="empty">読み込み中…</div></div>
      ) : view === "home" ? (
        <Home onSelect={setView} />
      ) : view === "teacher-gate" ? (
        <TeacherGate
          teacherPass={teacherPass}
          onSetPassword={async (pw) => { await saveTeacherPass(pw); setView("teacher"); }}
          onLogin={() => setView("teacher")}
          onBack={() => setView("home")}
        />
      ) : view === "teacher" ? (
        <Teacher
          students={students} tests={tests} scores={scores}
          saveStudents={saveStudents} saveTests={saveTests} saveScores={saveScores}
          onBack={() => setView("home")} notify={notify}
          teacherPass={teacherPass} saveTeacherPass={saveTeacherPass}
        />
      ) : view === "student-login" ? (
        <StudentLogin students={students} onBack={() => setView("home")} onLogin={(id) => { setStudentId(id); setView("student-dashboard"); }} />
      ) : view === "student-dashboard" ? (
        <StudentDashboard studentId={studentId} students={students} tests={tests} scores={scores} onLogout={() => { setStudentId(null); setView("home"); }} />
      ) : null}
      <Toast text={toast} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
